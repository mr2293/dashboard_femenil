name: Update Google Sheet & Deploy Femenil Shiny App

on:
  schedule:
    # Run daily at 10:30 PM Mexico City time (UTC-6) = 04:30 UTC
    - cron: '30 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout repo
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      # 1.5) Sync to origin/main (avoid local-change pull conflicts)
      - name: Sync to origin/main
        run: |
          set -e
          git fetch origin main
          git checkout -B main origin/main
          git reset --hard origin/main

      # 2) Set up Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      # 3) Ensure data folder exists
      - name: Ensure data folder exists
        run: mkdir -p data

      # 4) Download Cuestionario Femenil Google Sheet
      - name: Download Cuestionario Google Sheet
        env:
          SHEET_ID_FEM: ${{ secrets.SHEET_ID_FEM }}
        run: python download_gsheet.py

      # 4.5) Download RPE Femenil Google Sheet
      - name: Download RPE Google Sheet
        env:
          RPE_SHEET_ID_FEM: ${{ secrets.RPE_SHEET_ID_FEM }}
        run: python download_rpe_femenil.py

      # 5) Commit & push updated sheets (if changed)
      - name: Commit and push updated sheets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -f \
            data/cuestionario_femenil.xlsx \
            data/rpe_femenil.xlsx

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update femenil data sheets [skip ci]"
            git push origin main
          fi

      # 6) Build Docker image
      - name: Build Docker image
        run: docker build --pull --no-cache -t dashboard_femenil .

      # 7) Deploy Shiny app inside Docker
      - name: Deploy to shinyapps.io
        env:
          SHINY_ACC_NAME: ${{ secrets.SHINY_ACC_NAME }}
          TOKEN: ${{ secrets.TOKEN }}
          SECRET: ${{ secrets.SECRET }}
        run: |
          docker run --rm \
            -e SHINY_ACC_NAME="${SHINY_ACC_NAME}" \
            -e TOKEN="${TOKEN}" \
            -e SECRET="${SECRET}" \
            dashboard_femenil R -e "rsconnect::setAccountInfo(name=Sys.getenv('SHINY_ACC_NAME'), token=Sys.getenv('TOKEN'), secret=Sys.getenv('SECRET')); rsconnect::deployApp(appDir='.', launch.browser=FALSE, forceUpdate=TRUE)"
